<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FocusTube ELITE Pro</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --accent: #00d2ff; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: #0f172a; background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(225,39%,30%,1) 0, transparent 50%); background-attachment: fixed; color: white; margin: 0; padding: 20px; transition: 0.5s; }
        body.flow-mode .glass-card:not(#player-card), body.flow-mode h1 { display: none; }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        h1 { text-align: center; font-weight: 700; }
        #timer { font-size: 4rem; font-weight: 800; text-align: center; color: var(--accent); margin: 10px 0; }
        .stats { text-align: center; font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; }
        .btn { background: var(--accent); border: none; padding: 12px 24px; border-radius: 14px; color: #000; font-weight: 700; cursor: pointer; margin: 5px; transition: 0.3s; }
        .sound-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 50px; color: white; margin: 5px; cursor: pointer; display: inline-block; }
        .sound-chip.active { background: var(--accent); color: black; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .video-card { background: var(--glass); border-radius: 18px; padding: 10px; border: 1px solid var(--glass-border); cursor: pointer; }
        .video-card img { width: 100%; border-radius: 12px; }
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        iframe { width: 90%; aspect-ratio: 16/9; border-radius: 20px; border: 1px solid var(--accent); }
    </style>
</head>
<body>
    <h1>FocusTube <span style="color:var(--accent)">ELITE</span></h1>
    <div class="glass-card" style="text-align: center;">
        <div class="stats">Level: <span id="lvl">1</span> | XP: <span id="xp">0</span></div>
        <div class="sound-chip" onclick="toggleAudio('rain', this)">🌧️ Rain</div>
        <div class="sound-chip" onclick="toggleAudio('lofi', this)">🎹 Lofi</div>
    </div>
    <div class="glass-card">
        <div id="timer">45:00</div>
        <div style="text-align:center">
            <button class="btn" onclick="startTimer()">Start Session</button>
            <button class="btn" style="background:rgba(255,255,255,0.1); color:white" onclick="resetTimer()">Reset</button>
        </div>
    </div>
    <div class="glass-card">
        <input id="search" placeholder="Search Topic..." style="background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); padding:12px; border-radius:12px; width:65%; color:white; outline:none;">
        <button class="btn" style="width:25%" onclick="searchVideos()">Search</button>
    </div>
    <div id="results"></div>
    <div id="player-container">
        <div id="player" style="width: 100%; display: flex; justify-content: center;"></div>
        <div style="margin-top:20px">
            <button class="btn" style="background:#6c5ce7; color:white" onclick="document.body.classList.toggle('flow-mode')">🧘 Flow Mode</button>
            <button class="btn" style="background:#ff4757; color:white" onclick="exitPlayer()">Close</button>
        </div>
    </div>
    <audio id="rain" loop src="https://www.soundjay.com/nature/rain-07.mp3"></audio>
    <audio id="lofi" loop src="https://luan.xyz/files/audio/ambient_c_motion.mp3"></audio>

    <script>
        const API_KEY = 'AIzaSyCqnvF-pofNZMuhl7HxJah8LjtydavhFjM';
        let time = 2700, interval, xp = 0, lvl = 1;

        function toggleAudio(id, el) {
            const track = document.getElementById(id);
            if (track.paused) { track.play(); el.classList.add('active'); } 
            else { track.pause(); el.classList.remove('active'); }
        }

        async function searchVideos() {
            let q = document.getElementById("search").value;
            if(!q) return;
            try {
                let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)} oneshot&maxResults=10&type=video&key=${API_KEY}`);
                let data = await res.json();
                
                if (data.error) {
                    alert("Google API Alert: " + data.error.message);
                    return;
                }

                let results = document.getElementById("results");
                results.innerHTML = "";
                
                if (!data.items || data.items.length === 0) {
                    alert("No videos found! Try another topic.");
                    return;
                }

                data.items.forEach(v => {
                    let d = document.createElement("div");
                    d.className = "video-card";
                    d.innerHTML = `<img src="${v.snippet.thumbnails.medium.url}"><p style="font-size:11px; margin-top:8px">${v.snippet.title}</p>`;
                    d.onclick = () => playVideo(v.id.videoId);
                    results.appendChild(d);
                });
            } catch (e) {
                alert("Network Error! Check connection.");
            }
        }

        function playVideo(id) {
            document.getElementById("player-container").style.display = "flex";
            document.getElementById("player").innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen webkitallowfullscreen></iframe>`;
        }

        function exitPlayer() {
            document.getElementById("player-container").style.display = "none";
            document.getElementById("player").innerHTML = "";
            document.body.classList.remove('flow-mode');
        }

        function startTimer() {
            clearInterval(interval);
            interval = setInterval(() => {
                if (time > 0) {
                    time--; 
                    let m = Math.floor(time / 60), s = time % 60;
                    document.getElementById("timer").innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                } else {
                    clearInterval(interval); 
                    xp += 100;
                    if(xp >= lvl * 500) { lvl++; xp = 0; alert("Level Up! Level " + lvl); }
                    document.getElementById("xp").innerText = xp;
                    document.getElementById("lvl").innerText = lvl;
                    alert("Session Complete! +100 XP");
                }
            }, 1000);
        }

        function resetTimer() { 
            clearInterval(interval); 
            time = 2700; 
            document.getElementById("timer").innerText = "45:00"; 
        }
    </script>
</body>
</html>
